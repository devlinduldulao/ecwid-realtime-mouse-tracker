<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Mouse Tracker for Ecwid Listing Banner</title>
  <desc id="desc">Marketplace banner matching the current Ecwid-style dashboard UI.</desc>
  <rect width="1600" height="900" fill="#FFFFFF" />
  
  <rect x="72" y="72" width="1456" height="756" rx="44" fill="#F7F7F7" />

  <g transform="translate(124 130)">
    <rect x="0" y="0" width="252" height="48" rx="24" fill="#FCE8E8" />
    <text x="24" y="31" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E52222">ECWID NATIVE DASHBOARD</text>

    <!-- App Logo in the banner -->
    <rect x="0" y="90" width="96" height="96" fill="#FFFFFF" rx="24" stroke="#E6E6E6" stroke-width="2" />
    <path d="M 28 82 Q 38 88 52 74 T 52 46" stroke="#E52222" stroke-width="5" stroke-linecap="round" fill="none" stroke-linejoin="round" />
    <circle cx="52" cy="46" r="3" fill="#E52222" />
    <polygon points="50,44 50,86 60,76 70,100 80,94 70,72 86,72" fill="#333333" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" transform="translate(-8,-8)" />

    <text x="120" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#333333">Realtime Mouse Tracker</text>
    <text x="120" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#666666">for Ecwid</text>

    <text x="0" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#666666">Preview mode, same-browser self-test, and</text>
    <text x="0" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#666666">setup tooling in a static external module.</text>

    <g transform="translate(0 440)">
      <rect x="0" y="0" width="198" height="54" rx="10" fill="#333333" />
      <text x="28" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Preview Mode</text>
      
      <rect x="218" y="0" width="276" height="54" rx="10" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="2" />
      <text x="248" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#333333">Same-Browser Self-Test</text>
    </g>
  </g>

  <!-- Abstract UI representation of the Dashboard -->
  <g transform="translate(864 126)">
    <rect x="0" y="0" width="592" height="648" rx="22" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="4" />
    
    <!-- Top Stats Row -->
    <g transform="translate(34 34)">
      <rect x="0" y="0" width="160" height="120" rx="12" fill="#FCE8E8" />
      <text x="24" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#E52222">Active Trajectories</text>
      <text x="24" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#E52222">5</text>
      
      <rect x="180" y="0" width="160" height="120" rx="12" fill="#F7F7F7" stroke="#E6E6E6" stroke-width="2" />
      <text x="204" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#666666">Events / Min</text>
      <text x="204" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#333333">26</text>

      <rect x="360" y="0" width="160" height="120" rx="12" fill="#333333" />
      <text x="384" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#FFFFFF">Rage Clicks</text>
      <text x="384" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF">3</text>
    </g>

    <!-- Middle List Representation -->
    <g transform="translate(34 180)">
      <rect x="0" y="0" width="520" height="428" rx="12" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="2" />
      <text x="34" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#333333">Live Activity</text>
      
      <!-- List Items -->
      <rect x="34" y="86" width="452" height="76" rx="8" fill="#F7F7F7" />
      <text x="56" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#333333">Bamboo Desk Lamp</text>
      <text x="56" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#666666">/p/bamboo-desk-lamp</text>
      <rect x="380" y="106" width="90" height="36" rx="18" fill="#FCE8E8" />
      <text x="400" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#E52222">rage click</text>

      <rect x="34" y="174" width="452" height="76" rx="8" fill="#F7F7F7" />
      <text x="56" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#333333">Ceramic Pour Over Set</text>
      <text x="56" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#666666">/p/ceramic-pour-over-set</text>
      <rect x="406" y="196" width="60" height="36" rx="18" fill="#E6E6E6" />
      <text x="418" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#333333">click</text>

      <rect x="34" y="262" width="452" height="76" rx="8" fill="#F7F7F7" />
      <text x="56" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#333333">Minimalist Chair</text>
      <text x="56" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#666666">/p/minimalist-chair</text>
      <rect x="384" y="284" width="82" height="36" rx="18" fill="#E6E6E6" />
      <text x="398" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#333333">scrolling</text>
    </g>
  </g>
</svg>
